<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IQU TV PRO</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family: Arial;
}

/* HEADER */
header {
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* PLAYER */
#player {
    width:100%;
    height:260px;
    border:none;
    background:black;
}

/* MENSAJE */
.mensaje {
    text-align:center;
    color:#aaa;
    font-size:14px;
    margin:10px 0;
}

/* CATEGORIA */
.categoria {
    margin-top:20px;
}

h3 {
    padding-left:10px;
}

/* LISTA */
.videos {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

/* TARJETA */
.video-item {
    min-width:150px;
    cursor:pointer;
}

/* MINIATURA */
.thumb {
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:8px;
    background:#222;
}

/* TITULO */
.title {
    text-align:center;
    margin-top:5px;
    font-size:14px;
}
</style>
</head>

<body>

<header>🎬 IQU TV PRO</header>

<!-- PLAYER -->
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>

<div class="mensaje">
👉 Selecciona un video y presiona PLAY
</div>

<!-- MP4 80 -->
<div class="categoria">
<h3>MP4 80</h3>
<div class="videos" id="mp4_80"></div>
</div>

<!-- MP4 CUMBIA -->
<div class="categoria">
<h3>MP4 CUMBIA</h3>
<div class="videos" id="mp4_cumbia"></div>
</div>

<script>
fetch('videos.json')
.then(res => res.json())
.then(data => {

    const contenedor80 = document.getElementById("mp4_80");
    const contenedorCumbia = document.getElementById("mp4_cumbia");

    data.forEach(video => {

        let html = `
        <div class="video-item" onclick="playVideo('${video.id}')">
            <img src="${video.img}" class="thumb">
            <div class="title">${video.titulo}</div>
        </div>
        `;

        if(video.categoria === "MP4 80"){
            contenedor80.innerHTML += html;
        }

        if(video.categoria === "MP4 CUMBIA"){
            contenedorCumbia.innerHTML += html;
        }

    });

});

function playVideo(id){
    document.getElementById("player").src =
    "https://drive.google.com/file/d/" + id + "/preview";
}
</script>

</body>
</html>
