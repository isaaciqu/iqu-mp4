<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IQU TV PRO</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family: Arial;
}

/* HEADER */
header {
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* PLAYER */
#player {
    width:100%;
    height:280px;
    border:none;
    background:black;
}

/* MENSAJE */
.mensaje {
    text-align:center;
    color:#aaa;
    font-size:13px;
    margin:5px 0 10px;
}

/* CATEGORIA */
.categoria {
    margin-top:20px;
}

h3 {
    padding-left:12px;
}

/* LISTA */
.videos {
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:10px;
}

/* TARJETA */
.video-item {
    min-width:160px;
    cursor:pointer;
}

/* CONTENEDOR MINIATURA */
.thumb-container {
    position:relative;
}

/* IMAGEN */
.thumb-container img {
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:8px;
}

/* BOTON PLAY */
.play-btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:10px;
    font-size:20px;
}

/* TITULO */
.video-title {
    text-align:center;
    font-size:14px;
    margin-top:5px;
}
</style>
</head>

<body>

<header>🎬 IQU TV PRO</header>

<!-- PLAYER -->
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>

<div class="mensaje">
👉 Selecciona un video y presiona PLAY
</div>

<!-- MP4 80 -->
<div class="categoria">
<h3>MP4 80</h3>

<div class="videos">

<div class="video-item" onclick="playVideo('1mErnAimGiTiHt7HUnwv4DmnqPwnouIbv')">
    <div class="thumb-container">
        <img src="https://via.placeholder.com/300x150?text=Video+80-1">
        <div class="play-btn">▶</div>
    </div>
    <div class="video-title">Video 80 - 1</div>
</div>

<div class="video-item" onclick="playVideo('185_DRJQdQLMwm6imD02Vm9fkCE4KzwjY')">
    <div class="thumb-container">
        <img src="https://via.placeholder.com/300x150?text=Video+80-2">
        <div class="play-btn">▶</div>
    </div>
    <div class="video-title">Video 80 - 2</div>
</div>

<div class="video-item" onclick="playVideo('12UOAI6__pTzUFVI1eRlm-iFGIk4gPz11')">
    <div class="thumb-container">
        <img src="https://via.placeholder.com/300x150?text=Video+80-3">
        <div class="play-btn">▶</div>
    </div>
    <div class="video-title">Video 80 - 3</div>
</div>


</div>
</div>

<!-- MP4 CUMBIA -->
<div class="categoria">
<h3>MP4 CUMBIA</h3>

<div class="videos">

<div class="video-item" onclick="playVideo('1mErnAimGiTiHt7HUnwv4DmnqPwnouIbv')">
    <div class="thumb-container">
        <img src="https://via.placeholder.com/300x150?text=Cumbia+1">
        <div class="play-btn">▶</div>
    </div>
    <div class="video-title">Cumbia 1</div>
</div>

</div>
</div>

<script>
function playVideo(id){
    document.getElementById("player").src =
    "https://drive.google.com/file/d/" + id + "/preview";
}

/* AUTO CARGA PRIMER VIDEO */
window.onload = function(){
    playVideo("1mErnAimGiTiHt7HUnwv4DmnqPwnouIbv");
}
</script>

</body>
</html>
